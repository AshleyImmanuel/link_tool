<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkmap - {{center_name}}</title>
<style>{{viewer_css}}</style>
</head>
<body data-center-id="{{center_id}}">
<header id="header" class="navbar">
  <div class="container-fluid">
    <div class="navbar-brand">
      <strong>linkmap</strong>
      <span class="sep">/</span>
      <span class="mono">{{center_name}}</span>
    </div>

    <div id="toolbar" class="toolbar">
      <div id="searchWrap" class="search input-group">
        <span id="searchIcon" class="input-group-text" aria-hidden="true">⌕</span>
        <input id="search" class="form-control" placeholder="Search nodes (e.g. HeroSection, GET /hello)" autocomplete="off" />
        <span id="searchHint" class="hint"><span class="kbd">Enter</span> focus &nbsp; <span class="kbd">Esc</span> clear</span>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="btnFit">Fit</button>
        <button class="btn btn-outline-secondary" id="btnCenter">Center</button>
        <button class="btn btn-outline-secondary" id="btnClear">Clear</button>
      </div>
    </div>

    <div id="legend" class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>component</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span>route</span>
      <span class="legend-item"><span class="legend-dot" style="background:#2dd4bf"></span>handler</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>function</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fb7185"></span>call</span>
      <span class="legend-item"><span class="legend-dot" style="background:#c084fc"></span>render</span>
      <span class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span>import</span>
    </div>
  </div>
</header>
<div id="graph"></div>
<div id="side" aria-label="Inspector panel">
  <div id="sideHeader">
    <div id="sideTitle">Inspector</div>
    <button class="btn btn-outline-secondary btn-icon" id="btnHide" title="Hide inspector">×</button>
  </div>
  <div id="sideEmpty">
    Click a node or edge to inspect details.
    <div style="height:8px"></div>
    Tip: use the search box to jump to a symbol quickly.
  </div>
  <div id="sideBody" style="display:none">
    <div class="actions" id="sideBadges"></div>
    <div class="row">
      <div class="label">Name</div>
      <div class="value" id="insName"></div>
    </div>
    <div class="row">
      <div class="label">Location</div>
      <div class="value" id="insLoc"></div>
    </div>
    <div class="row" id="insWhyRow" style="display:none">
      <div class="label">Why / Details</div>
      <div class="value" id="insWhy"></div>
    </div>
    <div class="actions">
      <button class="btn" id="btnCopy">Copy</button>
      <button class="btn" id="btnOpen">Open in VS Code</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script id="vis-network-data" type="application/octet-stream">{{vis_network_js_base64}}</script>
<script id="nodes-data" type="application/json">{{nodes_json}}</script>
<script id="edges-data" type="application/json">{{edges_json}}</script>
<script>{{viewer_js}}</script>
</body>
</html>
