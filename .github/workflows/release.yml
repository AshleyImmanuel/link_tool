name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            exe: linkmap
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            exe: linkmap.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
            exe: linkmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare + package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force dist,out | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.exe }}" "dist/${{ matrix.exe }}"
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          $zip1 = "out/linkmap-$version-${{ matrix.asset_suffix }}.zip"
          $zip2 = "out/linkmap-windows-x86_64.zip"
          if (Test-Path $zip1) { Remove-Item $zip1 -Force }
          Compress-Archive -Path "dist/${{ matrix.exe }}" -DestinationPath $zip1 -CompressionLevel Optimal
          Copy-Item $zip1 $zip2 -Force

      - name: Prepare + package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist out
          cp "target/${{ matrix.target }}/release/${{ matrix.exe }}" "dist/${{ matrix.exe }}"
          version="${GITHUB_REF_NAME#v}"
          (cd dist && tar -czf "../out/linkmap-${version}-${{ matrix.asset_suffix }}.tar.gz" "${{ matrix.exe }}")
          if [[ "${{ matrix.asset_suffix }}" == "linux-x86_64" ]]; then
            cp "out/linkmap-${version}-${{ matrix.asset_suffix }}.tar.gz" "out/linkmap-linux-x86_64.tar.gz"
          elif [[ "${{ matrix.asset_suffix }}" == "macos-x86_64" ]]; then
            cp "out/linkmap-${version}-${{ matrix.asset_suffix }}.tar.gz" "out/linkmap-macos-x86_64.tar.gz"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linkmap-${{ matrix.asset_suffix }}
          path: out/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find dist -type f -maxdepth 2 -print0 | xargs -0 -I{} cp "{}" out/
          ls -la out

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd out
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*
